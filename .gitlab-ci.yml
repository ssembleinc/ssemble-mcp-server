stages:
  - deploy

deploy_main_api:
  stage: deploy
  script:
    - echo "Deploying MCP Server to API servers (10.0.0.12, 10.0.0.13)..."
    - |
      for machine in 10.0.0.12 10.0.0.13; do
        ssh ssemble@$machine '
          source /home/ssemble/.bashrc &&
          cd /home/ssemble/ssemble-mcp-server &&
          git stash &&
          git checkout main &&
          git reset --hard HEAD &&
          git pull origin main &&
          export PATH=$PATH:/home/ssemble/.nvm/versions/node/v18.20.8/bin &&
          npm install --production &&
          pm2 stop ssemble-mcp-http || true &&
          pm2 delete ssemble-mcp-http || true &&
          pm2 start process.json &&
          pm2 save
        '
      done
  only:
    - main
  when: manual
