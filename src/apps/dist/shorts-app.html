<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ssemble Shorts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      background: var(--color-background-primary, #1a1a2e);
      color: var(--color-text-primary, #e0e0e0);
      padding: 16px;
    }
    h2 { font-size: 18px; margin-bottom: 8px; color: var(--color-text-primary, #fff); }
    .source-info {
      font-size: 12px;
      color: var(--color-text-secondary, #888);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .clips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .clip-card {
      background: var(--color-background-secondary, #16213e);
      border-radius: var(--border-radius-md, 8px);
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .clip-card:hover { border-color: var(--color-border-primary, #4a6cf7); }
    .clip-card video {
      width: 100%;
      aspect-ratio: 9/16;
      object-fit: contain;
      background: #000;
      display: block;
      max-height: 400px;
    }
    .clip-body { padding: 12px; }
    .clip-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .clip-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .badge-duration {
      background: var(--color-background-tertiary, #0f3460);
      color: var(--color-text-primary, #e0e0e0);
    }
    .badge-score {
      color: #fff;
    }
    .badge-score.high { background: #22c55e; }
    .badge-score.medium { background: #eab308; }
    .badge-score.low { background: #ef4444; }
    .viral-bar {
      width: 100%;
      height: 4px;
      background: var(--color-background-tertiary, #0f3460);
      border-radius: 2px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .viral-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .viral-fill.high { background: #22c55e; }
    .viral-fill.medium { background: #eab308; }
    .viral-fill.low { background: #ef4444; }
    .clip-desc {
      font-size: 12px;
      color: var(--color-text-secondary, #888);
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .clip-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      padding: 6px 14px;
      border-radius: var(--border-radius-md, 6px);
      border: 1px solid var(--color-border-primary, #4a6cf7);
      background: transparent;
      color: var(--color-border-primary, #4a6cf7);
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--color-border-primary, #4a6cf7); color: #fff; }
    .btn-primary {
      background: var(--color-border-primary, #4a6cf7);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.85; }
    .clip-error {
      padding: 12px;
      font-size: 13px;
      color: #ef4444;
      text-align: center;
    }
    .loading { text-align: center; padding: 40px; color: var(--color-text-secondary, #888); }
    .no-clips { text-align: center; padding: 40px; color: var(--color-text-secondary, #888); }
    .rank { font-size: 20px; font-weight: 700; color: var(--color-text-secondary, #555); margin-right: 4px; }
  </style>
