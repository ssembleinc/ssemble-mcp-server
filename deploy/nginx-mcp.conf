# Ssemble MCP Server — NGINX config for load balancer (10.0.0.21)
# Install: sudo cp deploy/nginx-mcp.conf /etc/nginx/sites-available/mcp.ssemble.com
#          sudo ln -s /etc/nginx/sites-available/mcp.ssemble.com /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream mcp_backend {
    server 10.0.0.12:3100;
    server 10.0.0.13:3100;
}

server {
    listen 80;
    server_name mcp.ssemble.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp.ssemble.com;

    # SSL managed by Cloudflare or certbot
    # ssl_certificate /etc/letsencrypt/live/mcp.ssemble.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mcp.ssemble.com/privkey.pem;

    # MCP protocol endpoint — Streamable HTTP
    location /mcp {
        proxy_pass http://mcp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check
    location /health {
        proxy_pass http://mcp_backend;
        proxy_set_header Host $host;
    }

    # Smithery / MCP Registry auto-discovery
    location /.well-known/mcp/ {
        proxy_pass http://mcp_backend;
        proxy_set_header Host $host;
    }

    # Root — redirect to docs
    location = / {
        return 302 https://aiclipping.ssemble.com;
    }
}
